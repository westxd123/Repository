<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authenticate — Prodify Enterprise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
          colors: { 
            brand: { black: '#000', accent: '#10b981', dark: '#064e3b', glow: '#34d399' } 
          }
        }
      }
    }
  </script>
  <style>
    :root { --accent: #10b981; }
    body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
    
    .bg-grid {
      position: fixed; inset: 0;
      background-image: linear-gradient(to right, #0a1f1a 1px, transparent 1px), linear-gradient(to bottom, #0a1f1a 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      z-index: -1;
    }

    .glass-box { background: rgba(6, 78, 59, 0.03); backdrop-filter: blur(40px); border: 1px solid rgba(16, 185, 129, 0.1); }

    .input-premium {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white !important;
      transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .input-premium:focus {
      border-color: var(--accent);
      background: rgba(16, 185, 129, 0.08) !important;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
      outline: none;
    }

    /* AUTOFILL GLRE FIX - Tarayıcı beyazlığını yok eder */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 40px #061210 inset !important;
        -webkit-text-fill-color: #fff !important;
        transition: background-color 5000s ease-in-out 0s;
    }

    .btn-emerald {
      background: #fff; color: #000;
      font-family: 'Outfit', sans-serif; font-weight: 800;
      transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .btn-emerald:hover { 
      background: var(--accent); color: #fff; 
      box-shadow: 0 15px 30px rgba(16, 185, 129, 0.2); 
    }

    .text-glow {
      text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
    }

    .animate-in { animation: slideUp 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">
  <div class="bg-grid"></div>

  <div class="w-full max-w-md px-6 animate-in">
    <div class="text-center mb-12">
      <div class="inline-flex items-center gap-2 text-xl font-black mb-4 italic uppercase tracking-tighter">
        <div class="w-3 h-3 bg-brand-accent rounded-sm rotate-45"></div>
        PRODIFY <span class="text-brand-accent">/</span> AUTH
      </div>
      <!-- Language Switcher -->
      <div class="flex justify-center mb-6">
        <div class="flex items-center p-1 rounded-full bg-white/[0.04] border border-white/[0.08]" style="gap:2px">
          <button data-lang="en" onclick="setLanguage('en')" class="lang-btn px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-[0.2em] transition-all duration-300 text-gray-500">EN</button>
          <div class="w-px h-3 bg-white/10"></div>
          <button data-lang="tr" onclick="setLanguage('tr')" class="lang-btn px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-[0.2em] transition-all duration-300 text-gray-500">TR</button>
        </div>
      </div>
      <h1 id="auth-title" data-i18n="auth.title-login" class="text-3xl font-black font-display uppercase italic tracking-tight text-glow">Access Workspace</h1>
      <p id="auth-subtitle" data-i18n="auth.subtitle-login" class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mt-2">Initialize Security Protocol</p>
    </div>

    <div class="glass-box rounded-[48px] p-10 relative overflow-hidden">
      <!-- Decor -->
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-brand-accent/10 blur-3xl"></div>
      
      <form id="auth-form" class="space-y-6 relative z-10">
        <div id="register-fields" class="hidden space-y-6">
          <div>
            <label data-i18n="auth.org-label" class="text-[9px] font-black text-gray-600 uppercase tracking-widest block mb-2 px-1">Organization Identity</label>
            <input type="text" id="businessName" data-i18n-placeholder="auth.org-ph" placeholder="Business Name" class="input-premium w-full rounded-2xl px-6 py-4 text-sm text-white"/>
          </div>
        </div>

        <div>
          <label data-i18n="auth.email-label" class="text-[9px] font-black text-gray-600 uppercase tracking-widest block mb-2 px-1">Authorized Email</label>
          <input type="email" id="email" data-i18n-placeholder="auth.email-ph" placeholder="name@company.com" class="input-premium w-full rounded-2xl px-6 py-4 text-sm text-white"/>
        </div>

        <div>
          <label data-i18n="auth.pass-label" class="text-[9px] font-black text-gray-600 uppercase tracking-widest block mb-2 px-1">Secret Key</label>
          <input type="password" id="password" placeholder="••••••••" class="input-premium w-full rounded-2xl px-6 py-4 text-sm text-white"/>
        </div>

        <button type="submit" id="submit-btn" class="btn-emerald w-full py-5 rounded-2xl text-[11px] uppercase tracking-[0.3em] shadow-xl">
          Authorize Access
        </button>
      </form>

      <div class="mt-8 text-center">
        <button id="toggle-auth" class="text-[10px] font-black text-gray-600 hover:text-brand-accent uppercase tracking-widest transition-all italic">
          New Workspace? <span class="text-white underline underline-offset-4">Initialize One</span>
        </button>
      </div>
    </div>

    <a href="/" data-i18n="auth.return" class="block text-center mt-12 text-[9px] font-black text-gray-700 hover:text-white uppercase tracking-[0.5em] transition-all">
      Return to Headquarters
    </a>
  </div>

  <script src="app.js"></script>
  <script>
    let mode = 'login';
    const _t = (k) => { const lang = localStorage.getItem('prodify_lang') || 'en'; return (typeof TRANSLATIONS !== 'undefined' && TRANSLATIONS[lang] && TRANSLATIONS[lang][k]) ? TRANSLATIONS[lang][k] : k; };
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('mode') === 'register') toggleMode();

    function toggleMode() {
      mode = (mode === 'login' ? 'register' : 'login');
      const regFields = document.getElementById('register-fields');
      const title = document.getElementById('auth-title');
      const sub = document.getElementById('auth-subtitle');
      const btn = document.getElementById('submit-btn');
      const toggle = document.getElementById('toggle-auth');

      if(mode === 'register') {
        regFields.classList.remove('hidden');
        title.textContent = _t('auth.title-register');
        sub.textContent = _t('auth.subtitle-register');
        btn.textContent = _t('auth.btn-register');
        toggle.innerHTML = _t('auth.toggle-register');
      } else {
        regFields.classList.add('hidden');
        title.textContent = _t('auth.title-login');
        sub.textContent = _t('auth.subtitle-login');
        btn.textContent = _t('auth.btn-login');
        toggle.innerHTML = _t('auth.toggle-login');
      }
    }

    document.getElementById('toggle-auth').onclick = toggleMode;

    document.getElementById('auth-form').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const businessName = document.getElementById('businessName').value;

      const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/register';
      const body = mode === 'login' ? { email, password } : { email, password, businessName };

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.style.opacity = '0.5';

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if(data.success) {
          showToast(mode === 'login' ? 'Giriş başarılı! Yönlendiriliyorsunuz...' : 'Hesap oluşturuldu! Hoş geldiniz.', 'success');
          setTimeout(() => Auth.setSession(data.user), 800);
        } else {
          showToast(data.error || 'Bir hata oluştu.', 'error');
        }
      } catch(err) {
        showToast('Sunucuya bağlanılamadı. Lütfen tekrar deneyin.', 'error');
      } finally {
        btn.disabled = false;
        btn.style.opacity = '1';
      }
    };
  </script>
</body>
</html>
