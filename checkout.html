<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout // Prodify Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .text-impact { font-family: 'Inter', sans-serif; font-weight: 900; letter-spacing: -0.05em; }
    .input-premium { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1); }
    .input-premium:focus { border-color: #10b981; background: rgba(16, 185, 129, 0.05); outline: none; box-shadow: 0 0 30px rgba(16, 185, 129, 0.1); }
    .btn-emerald { background: linear-gradient(135deg, #10b981 0%, #059669 100%); transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1); cursor: pointer; border: none; font-weight: 900; color: white; }
    .btn-emerald:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3); filter: brightness(1.1); }
    .card-glow { position: relative; overflow: hidden; }
    .card-glow::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, transparent, rgba(16, 185, 129, 0.3), transparent 30%); animation: rotate 4s linear infinite; pointer-events: none; z-index: 0; }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top_right,rgba(16,185,129,0.08),transparent_50%)]">

  <div class="max-w-4xl w-full grid lg:grid-cols-2 gap-12 items-center">
    
    <!-- Left: Specs & Order -->
    <div class="reveal" id="order-info">
      <div class="inline-flex items-center gap-2 px-4 py-2 mb-8 text-[10px] font-black tracking-[0.4em] uppercase border border-brand-accent/30 rounded-full bg-brand-accent/10 text-[#10b981]">Secure Checkout // Protocol 256</div>
      <h1 class="text-impact text-5xl md:text-7xl italic uppercase mb-8">Access <br/> <span class="text-[#10b981]">Premium</span>.</h1>
      
      <div class="space-y-6 mb-12">
        <div class="flex items-center gap-4 group">
          <div class="w-10 h-10 rounded-full glass flex items-center justify-center text-[#10b981] group-hover:bg-[#10b981] group-hover:text-black transition-all">✓</div>
          <p class="text-sm font-bold text-gray-400 group-hover:text-white transition-colors uppercase tracking-widest">Unlimited AI Generations</p>
        </div>
        <div class="flex items-center gap-4 group">
          <div class="w-10 h-10 rounded-full glass flex items-center justify-center text-[#10b981] group-hover:bg-[#10b981] group-hover:text-black transition-all">✓</div>
          <p class="text-sm font-bold text-gray-400 group-hover:text-white transition-colors uppercase tracking-widest">Enterprise Neural Models</p>
        </div>
        <div class="flex items-center gap-4 group">
          <div class="w-10 h-10 rounded-full glass flex items-center justify-center text-[#10b981] group-hover:bg-[#10b981] group-hover:text-black transition-all">✓</div>
          <p class="text-sm font-bold text-gray-400 group-hover:text-white transition-colors uppercase tracking-widest">Priority Processing Lane</p>
        </div>
      </div>

      <div class="p-8 rounded-[40px] glass border-[#10b981]/20">
        <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">Total Amount</p>
        <div class="text-4xl font-black italic">$2.20 <span class="text-sm text-gray-500 font-bold not-italic">/ month</span></div>
      </div>
    </div>

    <!-- Right: Pay Card -->
    <div class="reveal" style="transition-delay: 0.2s">
      <div class="glass p-10 rounded-[48px] relative z-10">
        <div class="flex justify-between items-center mb-10">
          <div class="text-[11px] font-black uppercase tracking-[0.3em] text-gray-400">Payment Details</div>
          <div class="flex gap-2">
            <div class="w-8 h-5 bg-white/10 rounded-md"></div>
            <div class="w-8 h-5 bg-white/10 rounded-md"></div>
          </div>
        </div>

        <form id="pay-form" class="space-y-6">
          <div>
            <label class="text-[9px] font-black text-gray-600 uppercase tracking-widest block mb-3 px-1">Cardholder Identity</label>
            <input type="text" placeholder="FULL NAME" required class="input-premium w-full rounded-2xl px-6 py-4 text-sm font-bold text-white uppercase tracking-widest placeholder:text-gray-700"/>
          </div>
          
          <div>
            <label class="text-[9px] font-black text-gray-600 uppercase tracking-widest block mb-3 px-1">Neural Credential Number</label>
            <input type="text" placeholder="0000 0000 0000 0000" required class="input-premium w-full rounded-2xl px-6 py-4 text-sm font-bold text-white tracking-[0.2em] placeholder:text-gray-700"/>
          </div>

          <div class="grid grid-cols-2 gap-6">
            <div>
              <label class="text-[9px] font-black text-gray-600 uppercase tracking-widest block mb-3 px-1">EXPIRY</label>
              <input type="text" placeholder="MM/YY" required class="input-premium w-full rounded-2xl px-6 py-4 text-sm font-bold text-white tracking-widest placeholder:text-gray-700"/>
            </div>
            <div>
              <label class="text-[9px] font-black text-gray-600 uppercase tracking-widest block mb-3 px-1">SECRET</label>
              <input type="password" placeholder="***" required class="input-premium w-full rounded-2xl px-6 py-4 text-sm font-bold text-white tracking-widest placeholder:text-gray-700"/>
            </div>
          </div>

          <button type="submit" id="pay-btn" class="btn-emerald w-full py-6 rounded-3xl text-[12px] uppercase tracking-[0.4em] shadow-2xl mt-4">
            Authorize Payment // $2.20
          </button>
        </form>

        <p class="text-[8px] text-gray-600 uppercase tracking-widest text-center mt-8 leading-relaxed">
          Financial data is encrypted via military-grade RSA-4096. <br/> By authorizing, you agree to the Neural Service Terms.
        </p>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
      
      const user = Auth.getSession();
      if (!user) { window.location.href = 'auth.html'; return; }

      document.getElementById('pay-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('pay-btn');
        const lang = localStorage.getItem('prodify_lang') || 'en';
        
        btn.disabled = true;
        btn.innerHTML = 'PROCESSING ENCRYPTION...';
        btn.style.opacity = '0.7';

        try {
          // Bu kısım simüle edilmiştir - Gerçekte ödeme sonrası callback ile tetiklenir
          const response = await fetch(`${CONFIG.API_BASE}/api/subscribe`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: user.id, email: user.email })
          });
          
          const result = await response.json();
          if (!response.ok) throw new Error(result.error);

          showToast(lang === 'tr' ? 'Ödeme başarılı! Premium aktive edildi.' : 'Payment Success! Premium Activated.', 'success');
          
          // Local session güncelle
          const updatedUser = { ...user, plan: 'premium' };
          localStorage.setItem('yazai_session', JSON.stringify({ user: updatedUser, expiry: Date.now() + (24 * 60 * 60 * 1000) }));

          setTimeout(() => { window.location.href = 'profile.html'; }, 2000);
        } catch (err) {
          showToast(err.message || 'Payment failed.', 'error');
          btn.disabled = false;
          btn.innerHTML = 'Authorize Payment // $2.20';
          btn.style.opacity = '1';
        }
      };
    });
  </script>
</body>
</html>
