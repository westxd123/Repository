<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Checkout — Prodify Enterprise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
          colors: { 
            brand: { black: '#000', accent: '#10b981', dark: '#064e3b', glow: '#34d399' } 
          }
        }
      }
    }
  </script>
  <style>
    :root { --accent: #10b981; }
    body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    
    .bg-grid {
      position: fixed; inset: 0;
      background-image: linear-gradient(to right, #0a1f1a 1px, transparent 1px), linear-gradient(to bottom, #0a1f1a 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      z-index: -1;
    }

    .glass { background: rgba(6, 78, 59, 0.05); backdrop-filter: blur(24px); border: 1px solid rgba(16, 185, 129, 0.1); }

    .input-premium {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white !important;
      transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .input-premium:focus {
      border-color: var(--accent);
      background: rgba(16, 185, 129, 0.08) !important;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
      outline: none;
    }

    input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 40px #061210 inset !important;
        -webkit-text-fill-color: #fff !important;
    }

    .btn-emerald {
      background: #fff; color: #000;
      font-family: 'Outfit', sans-serif; font-weight: 800;
      transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .btn-emerald:hover { 
      background: var(--accent); color: #fff; 
      box-shadow: 0 15px 30px rgba(16, 185, 129, 0.2); 
    }

    .animate-in { animation: slideUp 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="antialiased min-h-screen">
  <div class="bg-grid"></div>

  <nav class="py-10 px-12 border-b border-brand-accent/10 glass">
    <a href="/" class="text-sm font-black tracking-tighter uppercase italic flex items-center gap-3">
      <div class="w-3 h-3 bg-brand-accent rounded-sm rotate-45"></div>
      PRODIFY <span class="text-brand-accent">/</span> SECURE CHECKOUT
    </a>
  </nav>

  <main class="max-w-5xl mx-auto py-32 px-6">
    <div class="grid md:grid-cols-2 gap-20 animate-in">
      <!-- Order Summary -->
      <div class="space-y-10">
        <h1 class="text-5xl font-black font-display italic uppercase tracking-tighter">Order Summary</h1>
        <div class="glass p-10 rounded-[48px] space-y-8">
          <div class="flex justify-between items-start pb-8 border-b border-white/5">
            <div>
              <p class="text-xl font-black italic">Pro Neural Mode</p>
              <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em] mt-2 font-bold">Infinite Intelligence Node</p>
            </div>
            <p class="text-3xl font-black">₺79</p>
          </div>
          <div class="space-y-4">
            <div class="flex justify-between text-[10px] font-black uppercase tracking-widest text-gray-500">
              <span>Security Protocol Fee</span>
              <span>₺0.00</span>
            </div>
            <div class="flex justify-between text-2xl font-black text-white pt-4">
              <span class="italic">Total Amount</span>
              <span class="text-brand-accent">₺79.00</span>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-4 px-4">
          <div class="w-2 h-2 bg-brand-accent rounded-full animate-pulse"></div>
          <p class="text-[9px] text-gray-500 uppercase tracking-[0.2em] font-bold">
            Secure Encryption Active // SSL Secure Node
          </p>
        </div>
      </div>

      <!-- Payment Fields -->
      <div class="glass p-10 rounded-[56px] space-y-10 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-brand-accent/5 blur-3xl"></div>
        
        <div class="space-y-8 relative z-10">
          <div>
            <label class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-500 block mb-3 italic">Capital Authorization Source</label>
            <input type="text" placeholder="Card Number" class="input-premium w-full rounded-2xl px-6 py-5 text-sm text-white"/>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <input type="text" placeholder="MM / YY" class="input-premium w-full rounded-2xl px-6 py-5 text-sm text-white"/>
            <input type="text" placeholder="CVC" class="input-premium w-full rounded-2xl px-6 py-5 text-sm text-white"/>
          </div>
          <div class="pt-6">
            <button onclick="handlePurchase()" class="btn-emerald w-full py-6 rounded-3xl text-xs uppercase tracking-[0.4em] shadow-2xl">
              Authorize Payment
            </button>
          </div>
          <p class="text-[8px] text-gray-600 text-center uppercase tracking-widest leading-relaxed">
            Payment handled via global secure protocols. No data is stored on external nodes.
          </p>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    async function handlePurchase() {
      const user = Auth.getSession();
      if(!user) return;

      try {
        const res = await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: user.id, email: user.email })
        });
        const data = await res.json();
        if(data.success) {
          // Update local session
          const session = JSON.parse(localStorage.getItem('yazai_session'));
          session.user.plan = 'premium';
          localStorage.setItem('yazai_session', JSON.stringify(session));
          
          alert("Sistem Yetkilendirildi! Premium aboneliğiniz aktif edildi. 🎉");
          window.location.href = '/profile.html';
        }
      } catch(err) {
        alert("Ödeme protokolü hatası.");
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if(!Auth.getSession()) window.location.href = 'auth.html?mode=register';
    });
  </script>
</body>
</html>
